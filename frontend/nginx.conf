server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Lightweight health endpoint for Docker HEALTHCHECK and load balancers
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy API calls to the Koyeb backend service.
    # Replace BACKEND_KOYEB_URL with your actual backend service URL before building.
    location /api/ {
        proxy_pass         https://BACKEND_KOYEB_URL;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host BACKEND_KOYEB_URL;
        proxy_cache_bypass $http_upgrade;
    }

    # React client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
