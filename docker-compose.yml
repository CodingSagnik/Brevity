version: "3.9"

services:
  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: lm_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-linkdb}
    volumes:
      - mongo_data:/data/db
    networks:
      - lm_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: lm_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-redissecret} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - lm_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Node / Express) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: lm_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongodb:27017/${MONGO_DB:-linkdb}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASS:-redissecret}@redis:6379
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lm_network

  # ─── Frontend (React / Vite) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: lm_frontend
    restart: unless-stopped
    environment:
      # Used by vite.config.js server.proxy to forward /api/* to the backend.
      # Inside Docker Compose, "backend" resolves via Docker's internal DNS.
      VITE_PROXY_TARGET: http://backend:5000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - lm_network

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  lm_network:
    driver: bridge
